<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Data Labs | Industrial Intelligence</title>
  <meta name="description" content="Signals intelligence for critical infrastructure, IT/OT convergence and industrial transformation." />
  <style>
    :root {
      --bg: #050a14;
      --bg2: #07111f;
      --card: rgba(255,255,255,0.03);
      --text: #eef4ff;
      --muted: #a1b3cc;
      --muted2: #657b99;
      --line: rgba(255,255,255,0.08);
      --accent: #65b7ff;
      --accent2: #7dffcf;
      --accent3: #9b8cff;
      --radius: 12px;
      --max: 1100px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 40px 20px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 60px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 60px;
    }

    .brand { display: flex; align-items: center; gap: 14px; font-weight: 700; letter-spacing: -0.02em; font-size: 1.2rem; }
    .mark { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; color: var(--bg); font-weight: 900; }
    .nav { display: flex; gap: 32px; font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex-wrap: wrap; }
    .nav a { text-decoration: none; color: inherit; transition: 0.2s; }
    .nav a:hover { color: var(--accent); }

    .hero { margin-bottom: 100px; }
    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin: 0 0 24px 0;
      font-weight: 700;
      max-width: 22ch;
    }
    .hero p {
      font-size: 1.25rem;
      color: var(--muted);
      max-width: 65ch;
      margin-bottom: 40px;
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 24px;
      display: block;
      font-weight: 700;
    }

    .grid-intel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--line);
      border: 1px solid var(--line);
      margin-bottom: 80px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      background: var(--line);
      border: 1px solid var(--line);
      margin-bottom: 80px;
    }
    
    .grid-use-cases {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      background: var(--line);
      border: 1px solid var(--line);
      margin-bottom: 80px;
    }

    .intel-item {
      background: var(--bg);
      padding: 32px;
    }
    .intel-item h3 { font-size: 1.1rem; margin: 0 0 12px 0; font-weight: 600; }
    .intel-item p { font-size: 0.95rem; color: var(--muted); margin: 0; }

    /* DATA LIBRARY STYLES */
    .data-library { padding: 80px 0; }
    .table-container {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 60px;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
    }
    .table-header h3 {
      font-size: 0.9rem;
      margin: 0 0 8px 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .table-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }
    .meta-bar {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--muted2);
      flex-wrap: wrap;
    }
    .meta-bar span {
      background: rgba(255,255,255,0.05);
      padding: 4px 8px;
      border-radius: 4px;
    }

    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1200px; }
    th { padding: 16px 24px; font-size: 0.7rem; text-transform: uppercase; color: var(--muted2); background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--line); }
    td { padding: 16px 24px; border-bottom: 1px solid var(--line); font-size: 0.85rem; vertical-align: top; }
    
    /* Status Badges */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
    .badge-engage { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; }
    .badge-monitor { background: rgba(255, 217, 61, 0.1); color: #ffd93d; }
    .badge-strategic { background: rgba(107, 255, 157, 0.1); color: #6bff9d; }
